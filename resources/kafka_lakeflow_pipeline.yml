resources:
  pipelines:
    kafka_lakeflow_order:
      name: "[${bundle.target}] kafka-lakeflow-order-pipeline"

      # Unity Catalog target
      catalog: na-dbxtraining
      schema:  biju_lakeflowschema

      # Serverless + Photon for cost-efficient streaming
      serverless: true
      photon:     true
      channel:    CURRENT

      # Triggered (false) — run on schedule or manually.
      # Set to true for near-real-time continuous mode.
      continuous: false

      # Source notebooks glob — order of execution follows file name prefix
      libraries:
        - glob:
            include: ${workspace.file_path}/src/**

      # Kafka connection parameters injected as pipeline config.
      # Secrets should be moved to Databricks Secrets in production.
      configuration:
        kafka.bootstrap.servers: pkc-921jm.us-east-2.aws.confluent.cloud:9092
        kafka.api.key:           UL6YKBFNBH2JTCSI
        kafka.api.secret:        "cfltQeJn9LPifhH0VIthd38Y4WNfEZ2EHwXQTTI2QC934i1JDZY3B7XV31ks5VCw"
        # Comma-separated list for Spark Kafka source "subscribe"
        kafka.topic:             orders.created,orders.updated,payments.authorized
        simulation.num_events:   "50"
